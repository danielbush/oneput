# https://taskfile.dev

version: "3"
silent: false
set:
  - errexit
  - nounset
  - pipefail

includes:
  oneput:
    taskfile: ./packages/oneput/Taskfile.yml
    dir: ./packages/oneput
  native:
    taskfile: ./packages/oneput-native-container/Taskfile.yml
    dir: ./packages/oneput-native-container
  jsed:
    taskfile: ./packages/jsed/Taskfile.yml
    dir: ./packages/jsed

tasks:
  default:
    cmds:
      - task --list-all

  install:
    cmds:
      - pnpm i
