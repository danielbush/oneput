# https://taskfile.dev

version: '3'
silent: false
set:
  - errexit
  - nounset
  - pipefail

includes:
  oneput:
    taskfile: ./packages/oneput/Taskfile.yml
    dir: ./packages/oneput
  native:
    taskfile: ./packages/oneput-native-container/Taskfile.yml
    dir: ./packages/oneput-native-container
  jsed-demo:
    taskfile: ./apps/jsed-demo/Taskfile.yml
    dir: ./apps/jsed-demo
  jsed:
    taskfile: ./packages/jsed/Taskfile.yml
    dir: ./packages/jsed

tasks:
  default:
    cmds:
      - task --list-all

  install:
    cmds:
      - pnpm i

  check:
    desc: run checks (eg types, linting) on all important packages
    cmds:
      - task: oneput:check
      - task: jsed:check
      - task: jsed-demo:check

  test:
    desc: run unit tests
    cmds:
      - task: jsed:test
      - task: oneput:test

  build:
    desc: run build across all important packages
    deps:
      - task: oneput:build
      - task: jsed:build
