# yaml-language-server: $schema=https://taskfile.dev/schema.json
# dotenv: ['.env']

version: '3'

tasks:
  default:
    desc: List available tasks
    cmds:
      - '{{.TASK_EXE}} --list'
    silent: true # Optional: hides the 'task: [default]' prefix

  webview:
    desc: run web server that renders the webview in this prototype; do this first
    cmds:
      - pnpm run serve-web
  expo:
    desc: run expo server that renders the webview in this prototype; do this second
    cmds:
      - pnpm run start

  run:android:
    desc: builds app using android sdk and runs it in the emulator
    summary: |
      (1) Install Android Studio
      (2) export JAVA_HOME and ANDROID_HOME - see shrc/java; both of these are provided by Android Studio
      (3) start an emulator so it's running
      (4) run this command, may take 13mins (!)
      The app will launch in your emulator but it will no longer be inside "expo go".
    cmds:
      - pnpm run android

  run:android:clean:
    desc: run:android but regenerate the native code
    summary: |
      Example:
        The `expo-share-intent` plugin is configured in `app.json`, but the
        AndroidManifest.xml doesn't have the required intent filters for
        receiving shared content. This means the native build hasn't been
        regenerated after adding the plugin.

        **The cause:** After adding or modifying the `expo-share-intent`
        plugin configuration in `app.json`, you need to rebuild the native
        Android project so Expo can apply the plugin's modifications to the
        AndroidManifest.
    cmds:
      - pnpx expo prebuild --clean
      - task: run:android
