# https://taskfile.dev

version: "3"
silent: false
set:
  - errexit
  - nounset
  - pipefail

includes:
  oneput:
    taskfile: ./packages/oneput/Taskfile.yml
    dir: ./packages/oneput
  oneput-demo:
    taskfile: ./apps/oneput-demo/Taskfile.yml
    dir: ./apps/oneput-demo
  native:
    taskfile: ./packages/oneput-native-container/Taskfile.yml
    dir: ./packages/oneput-native-container
  jsed-demo:
    taskfile: ./apps/jsed-demo/Taskfile.yml
    dir: ./apps/jsed-demo
  jsed:
    taskfile: ./packages/jsed/Taskfile.yml
    dir: ./packages/jsed

tasks:
  default:
    cmds:
      - task --list-all

  install:
    cmds:
      - pnpm i

  format:
    desc: format code
    cmds:
      - task: jsed:format
      - task: oneput:format
      - task: oneput-demo:format
      - task: jsed-demo:format
  check:
    desc: run checks (eg types, linting) on all important packages
    cmds:
      - task: oneput:check
      - task: oneput-demo:check
      - task: jsed:check
      - task: jsed-demo:check

  test:
    desc: run unit tests
    cmds:
      - task: jsed:test
      - task: oneput:test

  build:
    desc: run build across all important packages
    deps:
      - task: oneput:build
      - task: jsed:build

  skills:
    desc: Set up skills.
    vars:
      AGENTS: claude-code codex gemini-cli
    cmds:
      # - pnpx skills add danielbush/skills -y --agent {{.AGENTS}} --skill nullables-refactor --skill nullables-test --skill work-tracker --skill jcodemunch
      - pnpx skills add sveltejs/ai-tools -y --agent {{.AGENTS}} --skill svelte-code-writer --skill svelte-core-bestpractices

  devc:nuke:
    cmds:
      - pnpm exec devcontainer build --workspace-folder . --no-cache
      - pnpm exec devcontainer up --workspace-folder . --remove-existing-container
  devc:kill:
    cmds:
      - docker rm -f $(docker ps -q --filter "label=devcontainer.local_folder=/home/debian/projects/@oneput")
  devc:up:
    cmds:
      - pnpm exec devcontainer up --workspace-folder .
  devc:shell:
    interactive: true
    cmds:
      - pnpm exec devcontainer exec --workspace-folder . -- bash
  devc:claude:
    desc: Run Claude Code in the devcontainer (no permission prompts); run devc:up first
    summary: |
      Runs Claude Code inside the devcontainer with permissions auto-approved.

      Prerequisites:
        - Run devc:up first to start the container.

      Permission prompts are skipped via the --dangerously-skip-permissions
      CLI flag. This is safe because the devcontainer is sandboxed with
      firewall rules restricting network access.

      Authentication:
        Claude Pro/Max subscription (first time only):
          1. Start the devcontainer: task devc:up
          2. Open a shell: task devc:shell
          3. Run: claude login
          4. Open the printed URL in your host browser and approve
          5. Credentials are saved to the ~/.claude volume and persist across restarts

        API key:
          Set ANTHROPIC_API_KEY in your host shell before starting the container.

      Note: Do NOT set ANTHROPIC_API_KEY to an empty string in the container
      environment — Claude will try API key auth instead of OAuth and fail.
    interactive: true
    cmds:
      - |
        args=()
        if [ -n "${ANTHROPIC_API_KEY:-}" ]; then
          args+=(--remote-env "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY")
        fi
        pnpm exec devcontainer exec --workspace-folder . "${args[@]}" -- claude --dangerously-skip-permissions

  opensrc:add:
    cmds:
      - pnpx opensrc https://github.com/sveltejs/svelte.dev
      - pnpx opensrc https://github.com/vitest-dev/vitest
