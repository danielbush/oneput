# https://taskfile.dev

version: '3'
silent: false
set:
  - errexit
  - nounset
  - pipefail

includes:
  oneput:
    taskfile: ./packages/oneput/Taskfile.yml
    dir: ./packages/oneput
  oneput-demo:
    taskfile: ./apps/oneput-demo/Taskfile.yml
    dir: ./apps/oneput-demo
  native:
    taskfile: ./packages/oneput-native-container/Taskfile.yml
    dir: ./packages/oneput-native-container
  jsed-demo:
    taskfile: ./apps/jsed-demo/Taskfile.yml
    dir: ./apps/jsed-demo
  jsed:
    taskfile: ./packages/jsed/Taskfile.yml
    dir: ./packages/jsed

tasks:
  default:
    cmds:
      - task --list-all

  install:
    cmds:
      - pnpm i

  check:
    desc: run checks (eg types, linting) on all important packages
    cmds:
      - task: oneput:check
      - task: oneput-demo:check
      - task: jsed:check
      - task: jsed-demo:check

  test:
    desc: run unit tests
    cmds:
      - task: jsed:test
      - task: oneput:test

  build:
    desc: run build across all important packages
    deps:
      - task: oneput:build
      - task: jsed:build

  skills:
    desc: Set up skills.
    vars:
      AGENTS: claude-code codex gemini-cli
    cmds:
      - pnpm exec skills add danielbush/skills -y --agent {{.AGENTS}} --skill nullables
      - pnpm exec skills add davis7dotsh/better-context -y --agent {{.AGENTS}} --skill btca-cli

  claude:
    desc: Run Claude Code in the devcontainer (no permission prompts)
    summary: |
      Runs Claude Code inside the devcontainer with permissions auto-approved.

      1. build — builds the Docker image
      2. up — creates and starts the container, runs lifecycle scripts
      3. exec — runs claude inside the already-running container

      Permission prompts are skipped via dangerouslySkipPermissions in
      ~/.claude/settings.json, written on first container creation (see
      postCreateCommand in .devcontainer/devcontainer.json). This covers
      subagents too, since Claude Code spawns them as fresh processes that
      read settings.json rather than inheriting CLI flags.

      To authenticate with a Claude Pro/Max subscription (first time only):
        1. Start the devcontainer (e.g. open in VS Code or run: devcontainer up --workspace-folder .)
        2. Open a shell in the container and run: claude login
        3. Open the printed URL in your host browser and approve
        4. Credentials are saved to the ~/.claude volume and persist across restarts

      To authenticate with an API key instead, set ANTHROPIC_API_KEY in your host
      shell before starting the container.
    vars:
      REBUILD: '{{.REBUILD | default ""}}'
    interactive: true
    cmds:
      - pnpm exec devcontainer build --workspace-folder . {{if eq .REBUILD "yes"}}--no-cache{{end}}
      - pnpm exec devcontainer up --workspace-folder . {{if eq .REBUILD "yes"}}--remove-existing-container{{end}}
      - pnpm exec devcontainer exec --workspace-folder . -- claude

  btca:tui:
    cmds:
      - pnpm exec btca
